<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Friends</title>
    <meta property="og:title" content="Find Friends">
<meta property="og:description" content="Meet new friends instantly with video chat">
<meta property="og:type" content="website">
<meta property="og:url" content="https://video-chat-server-f2wn.onrender.com">
    <link rel="stylesheet" href="/style.css" />
    <style>
        .terms-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .terms-modal {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 350px;
            text-align: center;
        }
        .terms-modal h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        .terms-modal p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        .terms-modal .checkbox-group {
            margin-bottom: 1.5rem;
        }
        .terms-modal input[type="checkbox"] {
            margin-right: 0.5rem;
        }
        .terms-modal button {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            margin: 0 0.5rem;
        }
        .btn-accept {
            background: #007bff;
            color: white;
        }
        .btn-accept:hover {
            background: #0056b3;
        }
        .btn-accept:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
    </style>
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app">
      <header class="topbar">
        <h1>Find friends </h1>
        <p>meet new friends instantly</p>
      </header>

      <!-- Simple Terms Popup -->
      <div id="termsOverlay" class="terms-overlay">
        <div class="terms-modal">
          <h3>Terms of Service</h3>
          <p>Please agree to our Terms of Service to continue.</p>
          
          <div class="checkbox-group">
            <input type="checkbox" id="termsCheckbox">
            <label for="termsCheckbox">I agree to Terms of Service.</label>
          </div>
          
          <div>
            <a href="/terms" target="_blank" style="color: #007bff; text-decoration: none;">View Terms of Service</a>
          </div>
          
          <div>
            <button id="acceptBtn" class="btn-accept" disabled>Agree</button>
          </div>
        </div>
      </div>

      <section id="joinScreen" class="card join-card">
        <h2>Start Chat</h2>
        <p class="muted">Enter your details to connect with a random stranger.</p>

        <div class="form-group">
          <label for="nameInput">Name</label>
          <input id="nameInput" type="text" maxlength="30" placeholder="Your name" />
        </div>

        <div class="form-group">
          <label for="genderSelect">Gender</label>
          <select id="genderSelect">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button id="startBtn" class="btn btn-primary">Start Chat</button>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
